train:
  name: overfit
  seed: 42
  device: auto
  precision: fp32

  optimizer:
    name: adamw
    lr: 0.001
    weight_decay: 0.0

  scheduler:
    name: none
    warmup_steps: 0

  steps:
    max_steps: 1000
    log_every: 1
    save_every: 250
    eval_every: 250

  overfit_one_batch: true
  output_dir: runs/overfit
