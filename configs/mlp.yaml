# Configuration for MLP Robot Control Policy Training

dataset:
  repo_id: "lerobot/pusht"  # LeRobot dataset repo ID
  batch_size: 64
  num_workers: 4
  obs_horizon: 2           # History steps
  pred_horizon: 16         # Action chunk size predicted
  action_horizon: 8        # Action steps executed in env

model:
  state_dim: 2             # (updated dynamically from dataset)
  action_dim: 2            # (updated dynamically from dataset)
  hidden_dim: 256
  num_layers: 4
  use_visual: true
  image_key: "observation.image"
  visual_feature_dim: 64

train:
  epochs: 10
  learning_rate: 1e-4
  weight_decay: 1e-6
  device: "cuda"
  checkpoint_dir: "checkpoints"
  log_dir: "logs/mlp"
  save_freq: 2
  eval_freq: 2

eval:
  env_name: "PushT-v0"
  num_episodes: 5
