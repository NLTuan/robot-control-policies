dataset:
  name: board_clean
  repo_id: NLTuan/board_clean

  keys:
    state: observation.state
    action: action
    images:
      - observation.images.camera1
      - observation.images.camera2

  horizons:
    obs: 1
    action: 50

  loader:
    batch_size: 8
    shuffle: true
    num_workers: 4
    pin_memory: auto

  normalization:
    state: standard
    action: standard
