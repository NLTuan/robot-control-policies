train:
  name: local
  seed: 42
  device: auto
  precision: fp32

  optimizer:
    name: adamw
    lr: 0.0003
    weight_decay: 0.00001

  scheduler:
    name: cosine
    warmup_steps: 500

  steps:
    max_steps: 50000
    log_every: 50
    save_every: 1000
    eval_every: 1000

  output_dir: runs/local
